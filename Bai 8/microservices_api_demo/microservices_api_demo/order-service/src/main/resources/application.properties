spring.application.name=order-service
spring.datasource.url=jdbc:postgresql://postgres:5432/order_db
spring.datasource.username=thaituan
spring.datasource.password=123
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
server.port=8082
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
spring.security.user.name=eureka
spring.security.user.password=password
spring.kafka.bootstrap-servers=kafka-1:9092,kafka-2:9094,kafka-3:9096
spring.kafka.template.default-topic=notificationTopic
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
management.endpoint.health.show-details=always
management.endpoints.web.exposure.include=health,prometheus
management.tracing.sampling.probability=1.0
app.inventory-service.base-url=http://INVENTORY-SERVICE/v1/api/inventory
resilience4j.circuitbreaker.instances.inventory-service.sliding-window-size=5
resilience4j.circuitbreaker.instances.inventory-service.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.inventory-service.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.inventory-service.permitted-number-of-calls-in-half-open-state=2
resilience4j.circuitbreaker.instances.inventory-service.slow-call-duration-threshold=2s
resilience4j.circuitbreaker.instances.inventory-service.slow-call-rate-threshold=50
resilience4j.retry.instances.inventory-service.max-attempts=3
resilience4j.retry.instances.inventory-service.wait-duration=2s
resilience4j.retry.instances.inventory-service.retry-exceptions=org.springframework.web.client.HttpServerErrorException
resilience4j.timelimiter.instances.inventory-service.timeout-duration=10s
