services:
  postgres:
    image: postgres:16-alpine
    container_name: order-service-postgres
    environment:
      POSTGRES_DB: order_db
      POSTGRES_USER: thaituan
      POSTGRES_PASSWORD: 123
    ports:
      - "5432:5432"
    volumes:
      - order-service-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U thaituan -d order_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  order-service:
    build:
      context: .
    container_name: order-service
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/order_db
      SPRING_DATASOURCE_USERNAME: thaituan
      SPRING_DATASOURCE_PASSWORD: 123
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://host.docker.internal:8761/eureka
      SPRING_KAFKA_BOOTSTRAP_SERVERS: host.docker.internal:9092
      APP_INVENTORY_SERVICE_BASE_URL: http://host.docker.internal:8083/v1/api/inventory
    ports:
      - "8082:8082"
    restart: unless-stopped

volumes:
  order-service-postgres-data:
