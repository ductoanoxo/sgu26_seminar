spring.application.name=order-service

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/order}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:thaituan}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:123}
spring.jpa.hibernate.ddl-auto=update
server.port=8082

#Eureka
eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
spring.security.user.name=eureka
spring.security.user.password=password

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092,localhost:9094,localhost:9096}

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

#Actuator, Prometheus Endpoints
management.endpoint.health.show-details=always
management.endpoints.web.exposure.include=health, prometheus
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=${ZIPKIN_BASE_URL:http://localhost:9411}/api/v2/spans

#Resilience4j
resilience4j.circuitbreaker.instances.inventory-service.sliding-window-size=5
resilience4j.circuitbreaker.instances.inventory-service.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.inventory-service.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.inventory-service.permitted-number-of-calls-in-half-open-state=2
resilience4j.circuitbreaker.instances.inventory-service.slow-call-duration-threshold=2s
resilience4j.circuitbreaker.instances.inventory-service.slow-call-rate-threshold=50
resilience4j.retry.instances.inventory-service.max-attempts=3
resilience4j.retry.instances.inventory-service.wait-duration=2s
resilience4j.retry.instances.inventory-service.retryExceptions = org.springframework.web.client.HttpServerErrorException
resilience4j.timelimiter.instances.inventory-service.timeout-duration=10s



